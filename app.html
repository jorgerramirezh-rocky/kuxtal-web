<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kuxtal Travels — CRM</title>
<meta name="theme-color" content="#0f2438">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=League+Gothic&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{--kux:#1b365d;--kux-d:#0f2438;--kux-l:#e9eef5;--lima:#8dc63f;--lima-d:#6f9e12;
    --rojo:#e5484d;--amar:#f2a900;--verde:#22a06b;--gris:#8a94a6;--tinta:#0f2438;--papel:#f4f6f8;--linea:#e6ebef;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{max-width:100%;overflow-x:hidden}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--papel);color:var(--tinta);-webkit-font-smoothing:antialiased;font-size:16px}
  img,canvas{max-width:100%}
  /* ── HEADER ── */
  header{position:relative;background:linear-gradient(120deg,var(--kux-d),var(--kux),#245078,var(--kux));background-size:300% 300%;animation:grad 12s ease infinite;color:#fff;padding:14px 14px 20px;padding-top:calc(14px + env(safe-area-inset-top))}
  @keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  .hwrap{max-width:960px;margin:0 auto}
  .logo{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
  .logo .lg{font-family:'League Gothic',sans-serif;font-size:clamp(30px,8vw,40px);line-height:.85;letter-spacing:1px}
  .logo .tr{font-family:'League Gothic',sans-serif;font-size:clamp(14px,4vw,18px);letter-spacing:4px;opacity:.9}
  .logo .pl{color:var(--lima);font-size:clamp(17px,5vw,22px);display:inline-block;animation:fly 3.2s ease-in-out infinite}
  @keyframes fly{0%,100%{transform:translate(0,0)}50%{transform:translate(7px,-3px)}}
  header .slogan{color:var(--lima);font-size:clamp(9px,2.6vw,11px);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-top:4px}
  .out{position:absolute;top:calc(12px + env(safe-area-inset-top));right:12px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.28);color:#fff;border-radius:10px;padding:10px 14px;font-size:12px;font-weight:600;cursor:pointer;min-height:44px}
  .out:active{transform:scale(.95)}
  /* ── LAYOUT ── */
  .wrap{max-width:960px;margin:0 auto;padding:0 12px calc(40px + env(safe-area-inset-bottom))}
  /* KPIs: 2 col en cel, 4 en pantalla mayor */
  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin:-12px 0 14px}
  .stat{position:relative;min-width:0;background:#fff;border:1px solid var(--linea);border-radius:15px;padding:12px 8px;text-align:center;box-shadow:0 3px 12px rgba(15,36,56,.06);cursor:pointer;overflow:hidden;transform:translateY(12px);opacity:0;animation:pop .5s ease forwards;transition:transform .18s,box-shadow .18s}
  .stat:nth-child(1){animation-delay:.05s}.stat:nth-child(2){animation-delay:.12s}.stat:nth-child(3){animation-delay:.19s}.stat:nth-child(4){animation-delay:.26s}
  @keyframes pop{to{transform:translateY(0);opacity:1}}
  .stat::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--kux)}
  .stat.lima::before{background:var(--lima)} .stat.rojo::before{background:var(--rojo)} .stat.gold::before{background:var(--amar)}
  .stat:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(15,36,56,.14)} .stat:active{transform:scale(.98)}
  .stat b{display:block;font-size:clamp(17px,5.4vw,22px);line-height:1.1;font-variant-numeric:tabular-nums;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stat span{font-size:clamp(9px,2.6vw,11px);color:var(--gris)}
  .stat.rojo b{color:var(--rojo)} .stat.lima b{color:var(--lima-d)} .stat.gold b{color:#b5820b}
  /* TABS */
  .tabs{display:flex;gap:6px;margin:0 0 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:none;padding:11px 16px;border:1px solid var(--linea);background:#fff;border-radius:11px;font-size:13px;font-weight:600;color:var(--gris);cursor:pointer;white-space:nowrap;transition:all .2s;min-height:44px}
  .tab.on{background:var(--kux);color:#fff;border-color:var(--kux);box-shadow:0 4px 12px rgba(27,54,93,.28)}
  .tab:active{transform:scale(.97)}
  .search{position:relative;margin-bottom:12px;display:none}
  .search input{width:100%;padding:13px 14px 13px 40px;border:1px solid var(--linea);border-radius:12px;font-size:16px;outline:none}
  .search input:focus{border-color:var(--kux);box-shadow:0 0 0 3px rgba(27,54,93,.1)}
  .search .ico{position:absolute;left:13px;top:13px;color:var(--gris)}
  .cap{color:var(--gris);font-size:12px;margin:0 2px 12px;line-height:1.45}
  .filtros{display:flex;gap:6px;margin:0 0 12px;flex-wrap:wrap}
  .fb{border:1px solid var(--linea);background:#fff;border-radius:10px;padding:11px 14px;font-size:12.5px;font-weight:600;color:var(--gris);cursor:pointer;min-height:44px}
  .fb.on{background:var(--kux);color:#fff;border-color:var(--kux)} .fb:active{transform:scale(.97)}
  /* GRID de gráficas: 1 col en cel, 2 en pantalla mayor */
  .grid{display:grid;grid-template-columns:1fr;gap:12px}
  .panel{min-width:0;background:#fff;border:1px solid var(--linea);border-radius:18px;padding:15px;box-shadow:0 3px 14px rgba(15,36,56,.05);opacity:0;transform:translateY(14px);animation:rise .5s ease forwards}
  .panel.full{grid-column:1/-1}
  @keyframes rise{to{opacity:1;transform:translateY(0)}}
  .panel h3{font-size:14px;color:var(--kux);margin-bottom:1px;font-weight:800}
  .panel .sub{font-size:11px;color:var(--gris);margin-bottom:10px;line-height:1.4}
  .canvas-box{position:relative;width:100%;height:200px}
  /* TARJETAS de socio */
  .card{min-width:0;background:#fff;border:1px solid var(--linea);border-radius:14px;padding:12px 13px;margin-bottom:9px;box-shadow:0 1px 3px rgba(15,36,56,.04);opacity:0;animation:rise .4s ease forwards}
  .card .top{display:flex;align-items:flex-start;gap:10px}
  .dot{width:10px;height:10px;border-radius:50%;flex:none;margin-top:5px}
  .dot.r{background:var(--rojo)}.dot.a{background:var(--amar)}.dot.v{background:var(--verde)}.dot.b{background:var(--lima)}.dot.g{background:var(--gris)}
  .dot.r{box-shadow:0 0 0 0 rgba(229,72,77,.5);animation:pulse 2s infinite}
  @keyframes pulse{70%{box-shadow:0 0 0 7px rgba(229,72,77,0)}100%{box-shadow:0 0 0 0 rgba(229,72,77,0)}}
  .who{min-width:0;flex:1}
  .nombre{font-weight:700;font-size:15.5px;word-break:break-word}
  .meta{font-size:12.5px;color:var(--gris);margin-top:2px;word-break:break-word;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .der{text-align:right;font-size:12px;font-weight:700;flex:none;white-space:nowrap}
  .der.r{color:var(--rojo)}.der.a{color:var(--amar)}.der.v{color:var(--verde)}.der.g{color:var(--gris)}
  .acciones{display:flex;gap:7px;margin-top:11px;flex-wrap:wrap;align-items:center}
  .btn-c{color:#fff;border:none;border-radius:11px;padding:10px 14px;font-size:13.5px;font-weight:700;cursor:pointer;text-decoration:none;min-height:42px;display:inline-flex;align-items:center;justify-content:center}
  .btn-c:active{transform:scale(.96)} .wa{background:#25d366}.tel{background:var(--kux)} .edit{background:#fff;color:var(--kux);border:1px solid var(--linea)}
  .estados{display:flex;gap:5px;flex-wrap:wrap;margin-left:auto}
  .eb{border:1px solid var(--linea);background:#fff;border-radius:9px;padding:9px 11px;font-size:11.5px;cursor:pointer;color:var(--tinta);min-height:40px}
  .eb.on{background:var(--kux-l);border-color:var(--kux);color:var(--kux-d);font-weight:700}
  .eb:active{transform:scale(.95)}
  .chip{font-size:10.5px;border-radius:7px;padding:3px 7px;font-weight:700;white-space:nowrap}
  .chip.vip{background:#eaf3ff;color:var(--kux)}.chip.exc{background:#efe6ff;color:#6b3fb0}.chip.gold{background:#fff3d6;color:#b5820b}.chip.reg{background:#f1f3f5;color:var(--gris)}
  .warn{background:#fdecea;color:#b3261e;font-size:10.5px;border-radius:7px;padding:3px 7px;font-weight:700}
  .vacio{text-align:center;color:var(--gris);padding:40px 22px;background:#fff;border:1px dashed var(--linea);border-radius:18px}
  .vacio .em{font-size:34px;display:block;margin-bottom:8px}
  .vacio b{color:var(--kux);font-size:16px;display:block;margin-bottom:4px}
  .vacio p{font-size:13px;line-height:1.5;max-width:360px;margin:0 auto}
  .insight{background:linear-gradient(135deg,#fffaf0,#fff);border:1px solid #f2d98a;border-radius:16px;padding:13px 15px;font-size:12.5px;color:#7a5f16;line-height:1.5}
  .insight.full{grid-column:1/-1}
  .masbtn{display:block;width:100%;padding:13px;margin-top:4px;border:1px solid var(--linea);background:#fff;border-radius:12px;font-size:13px;font-weight:700;color:var(--kux);cursor:pointer;min-height:46px}
  /* LOGIN */
  #gate{position:fixed;inset:0;z-index:50;background:linear-gradient(135deg,var(--kux-d),var(--kux),#245078);background-size:300% 300%;animation:grad 12s ease infinite;display:flex;align-items:center;justify-content:center;padding:20px}
  .lbox{background:#fff;border-radius:22px;padding:30px 24px;width:100%;max-width:360px;box-shadow:0 24px 60px rgba(0,0,0,.35);text-align:center}
  .lbox .lg{font-family:'League Gothic',sans-serif;font-size:44px;color:var(--kux);line-height:.9}
  .lbox .tr{font-family:'League Gothic',sans-serif;font-size:16px;letter-spacing:5px;color:var(--lima-d)}
  .lbox .pl{color:var(--lima);font-size:22px}
  .lbox p{color:var(--gris);font-size:12.5px;margin:6px 0 20px}
  .lbox input{width:100%;padding:14px 15px;border:1px solid var(--linea);border-radius:12px;font-size:16px;margin-bottom:11px;outline:none}
  .lbox input:focus{border-color:var(--kux);box-shadow:0 0 0 3px rgba(27,54,93,.12)}
  .lbox button{width:100%;padding:15px;border:none;border-radius:12px;background:var(--kux);color:#fff;font-size:16px;font-weight:700;cursor:pointer;min-height:50px}
  .lbox button:active{transform:scale(.98)} .lbox button:disabled{opacity:.6}
  .lerr{color:var(--rojo);font-size:12.5px;margin-top:10px;min-height:16px}
  #load{position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;background:var(--papel);color:var(--gris);font-size:14px}
  .spin{width:26px;height:26px;border:3px solid var(--kux-l);border-top-color:var(--kux);border-radius:50%;animation:sp .8s linear infinite;margin-right:10px}
  @keyframes sp{to{transform:rotate(360deg)}}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--kux-d);color:#fff;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:70;max-width:90vw;text-align:center}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  /* MODAL editar */
  .modal{position:fixed;inset:0;z-index:60;background:rgba(15,36,56,.5);display:flex;align-items:flex-end;justify-content:center;padding:0}
  .mcard{background:#fff;width:100%;max-width:460px;border-radius:20px 20px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;animation:up .28s ease}
  @keyframes up{from{transform:translateY(30px);opacity:.6}to{transform:translateY(0);opacity:1}}
  .mcard h3{color:var(--kux);font-size:18px;margin-bottom:14px}
  .mcard label{display:block;font-size:12px;font-weight:700;color:var(--gris);margin:12px 0 5px}
  .mcard input,.mcard select{width:100%;padding:12px 13px;border:1px solid var(--linea);border-radius:11px;font-size:16px;outline:none;background:#fff}
  .mcard input:focus,.mcard select:focus{border-color:var(--kux);box-shadow:0 0 0 3px rgba(27,54,93,.1)}
  .ferr{color:var(--rojo);font-size:12px;margin-top:5px;min-height:15px}
  .macc{display:flex;gap:10px;margin-top:20px}
  .macc button{flex:1;padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;min-height:50px;border:none}
  .mcancel{background:#fff;border:1px solid var(--linea)!important;color:var(--tinta)}
  .msave{background:var(--kux);color:#fff}
  .macc button:active{transform:scale(.98)}
  /* Ficha 360 */
  .fcard{max-width:520px}
  .fn{font-size:21px;font-weight:800;color:var(--kux);word-break:break-word;line-height:1.15}
  .fsec{border-top:1px solid var(--linea);padding:13px 0}
  .fsec:first-of-type{border-top:none}
  .fsec h4{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--gris);margin-bottom:8px}
  .frow{display:flex;justify-content:space-between;gap:12px;font-size:14px;padding:4px 0}
  .frow>span{color:var(--gris);flex:none} .frow>b{text-align:right;word-break:break-word}
  .tl{list-style:none;margin:12px 0 0;padding:0}
  .tli{border-left:2px solid var(--kux-l);padding:0 0 13px 13px;position:relative}
  .tli:last-child{padding-bottom:0}
  .tli::before{content:"";position:absolute;left:-5px;top:3px;width:8px;height:8px;border-radius:50%;background:var(--kux)}
  .tli .tt{font-size:11px;color:var(--gris)} .tli .tc{font-size:14px;margin-top:1px}
  .fadd{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
  .fadd textarea{width:100%;border:1px solid var(--linea);border-radius:11px;padding:11px 12px;font-size:16px;min-height:58px;outline:none;resize:vertical;font-family:inherit}
  .fadd textarea:focus{border-color:var(--kux);box-shadow:0 0 0 3px rgba(27,54,93,.1)}
  /* Kuxtal Club — tarjeta + validación */
  .tcard{position:relative;overflow:hidden;background:linear-gradient(135deg,#0b1c2e,#1b365d 55%,#2a5f8f);color:#fff;border-radius:20px;padding:22px 20px;box-shadow:0 16px 40px rgba(11,28,46,.45);border:1px solid rgba(255,255,255,.08)}
  .tcard::after{content:"";position:absolute;top:-40%;right:-25%;width:75%;height:180%;background:radial-gradient(closest-side,rgba(141,198,63,.20),transparent);transform:rotate(20deg);pointer-events:none}
  .tcard-top{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1}
  .tcard .tt{font-family:'League Gothic',sans-serif;font-size:22px;letter-spacing:2px}
  .tcard .tplane{color:var(--lima);font-size:20px}
  .tcard .tn{font-size:22px;font-weight:800;margin:18px 0 8px;letter-spacing:.3px;word-break:break-word;position:relative;z-index:1}
  .tcard .trow{display:flex;align-items:center;gap:10px;position:relative;z-index:1}
  .tcard .tv{background:linear-gradient(135deg,#f2c94c,#e0a422);color:#3a2a00;font-weight:800;border-radius:8px;padding:3px 12px;font-size:13px;letter-spacing:.5px}
  .tcard .tsince{font-size:10px;letter-spacing:1.5px;opacity:.75}
  .tcard .tno{font-size:12px;opacity:.7;margin-top:14px;font-variant-numeric:tabular-nums;letter-spacing:1px;position:relative;z-index:1}
  .ocard{display:flex;gap:12px;align-items:center;background:#fff;border:1px solid var(--linea);border-radius:14px;padding:12px;margin-bottom:8px;box-shadow:0 1px 3px rgba(15,36,56,.04)}
  .oemoji{font-size:26px;flex:none}
  .otit{font-weight:800;color:var(--kux);font-size:15px}
  .odesc{background:linear-gradient(135deg,#f2c94c,#e0a422);color:#3a2a00;border-radius:6px;padding:1px 8px;font-size:12px;font-weight:800;margin-left:4px;white-space:nowrap}
  .odescr{font-size:12.5px;color:var(--tinta);margin-top:2px;line-height:1.4}
  .ometa{font-size:11px;color:var(--gris);margin-top:3px}
  .obadge{flex:none;align-self:center;font-size:11px;font-weight:800;border-radius:9px;padding:7px 11px;white-space:nowrap;min-height:34px;display:flex;align-items:center}
  .obadge.use{background:var(--kux);color:#fff}
  .obadge.used{background:#e9f7ef;color:#1f8a54;border:1px solid #bfe6cf}
  .ocard.isused{opacity:.72}
  .bh{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--gris);margin:16px 2px 8px}
  .tcard.vip{border:1px solid rgba(242,201,76,.55);box-shadow:0 16px 40px rgba(11,28,46,.5),0 0 0 1px rgba(242,201,76,.15) inset}
  .qrbox{background:#fff;border-radius:14px;padding:14px;display:inline-block;margin:14px 0;box-shadow:0 3px 12px rgba(15,36,56,.1)}
  .codebig{font-size:26px;font-weight:800;letter-spacing:3px;color:var(--kux);font-variant-numeric:tabular-nums}
  #valida{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;padding:24px;color:#fff;text-align:center;background:var(--kux-d)}
  #valida.ok{background:linear-gradient(135deg,#1a8a52,#22a06b)} #valida.bad{background:linear-gradient(135deg,#b3261e,#e5484d)}
  #valida .vbig{font-size:64px} #valida .vt{font-size:26px;font-weight:800;margin:10px 0;word-break:break-word} #valida .vs{font-size:16px;opacity:.95}
  #valida button{margin-top:22px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.45);color:#fff;padding:13px 24px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;min-height:48px}
  /* ── TABLET / DESKTOP ── */
  @media (min-width:600px){
    .stats{grid-template-columns:repeat(4,1fr);gap:11px}
    .grid{grid-template-columns:1fr 1fr}
    .modal{align-items:center;padding:20px}
    .mcard{border-radius:20px}
  }
  @media (min-width:960px){ .canvas-box{height:210px} }
</style>
</head>
<body>

<div id="load"><span class="spin"></span> Cargando…</div>

<div id="gate" style="display:none">
  <div class="lbox">
    <div><span class="lg">KUXTAL</span> <span class="tr">TRAVELS</span> <span class="pl">✈</span></div>
    <p>Panel del equipo · acceso privado</p>
    <input id="u" type="email" placeholder="Usuario" autocomplete="username" value="equipo@kuxtal.app">
    <input id="p" type="password" placeholder="Contraseña" autocomplete="current-password">
    <button id="entrar" onclick="login()">Entrar</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<div id="app" style="display:none">
<header><button class="out" onclick="salir()">Salir</button><div class="hwrap">
  <div class="logo"><span class="lg">KUXTAL</span><span class="tr">TRAVELS</span><span class="pl">✈</span></div>
  <div class="slogan">Cada destino, una historia · Business Intelligence</div>
  <div class="slogan" id="rolLabel" style="text-transform:none;letter-spacing:0;opacity:.9"></div>
</div></header>

<div class="wrap">
  <div class="stats">
    <div class="stat lima" onclick="ir('tablero')"><b id="k1">$0</b><span>Ventas totales</span></div>
    <div class="stat gold" onclick="ir('tablero')"><b id="k2">$0</b><span>Ticket prom.</span></div>
    <div class="stat" onclick="ir('todos')"><b id="k3">0</b><span>Socios</span></div>
    <div class="stat rojo" onclick="ir('vencimientos')"><b id="k4">0</b><span>Por vencer 12m</span></div>
  </div>
  <div class="tabs">
    <div class="tab on" data-t="tablero">Tablero BI</div>
    <div class="tab" data-t="vencimientos">Renovaciones</div>
    <div class="tab" data-t="todos">Directorio</div>
    <div class="tab" data-t="promos">🎁 Promos</div>
    <div class="tab" data-t="leads">Prospectos</div>
    <div class="tab" data-t="bot">🤖 Bot &amp; WhatsApp</div>
    <div class="tab" data-t="activacion">Activación</div>
  </div>
  <div class="search" id="search"><span class="ico">🔎</span><input id="buscar" placeholder="Buscar por nombre…"></div>
  <div class="cap" id="cap"></div>
  <div id="filtros"></div>
  <div id="tablero"></div>
  <div id="lista"></div>
</div>

function calcularBI(){

  const enRiesgo=gente.filter(x=>x.dv!=null&&x.dv>=0&&x.dv<=365).reduce((a,x)=>a+x.total,0);
  const telMal=gente.filter(x=>!telOK(x.tel)).length;
  const revisar=gente.filter(necesitaRevision).length;
  const sum=(f,g)=>{const m={};gente.forEach(x=>{const k=g(x);if(k==null||k==="")return;m[k]=(m[k]||0)+f(x);});return m;};
  const porTipo=sum(()=>1,x=>x.tipo), revTipo=sum(x=>x.total,x=>x.tipo), revCloser=sum(x=>x.total,x=>(x.closer||"").trim());
  const vencAnio={}, ingMesMap={}; let vig=0,ven=0,sinf=0;
  gente.forEach(x=>{
    if(x.dv==null)sinf++; else if(x.dv<0)ven++; else vig++;
    if(x.venc){const y=x.venc.slice(0,4);vencAnio[y]=(vencAnio[y]||0)+1;}
    if(x.ingreso){const m=x.ingreso.slice(0,7);ingMesMap[m]=(ingMesMap[m]||0)+x.total;}
  });
  const lbl=m=>{const[y,mo]=m.split("-");return ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"][+mo-1]+" "+y.slice(2);};
  const meses=Object.keys(ingMesMap).sort();
  const ingMes=meses.slice(-12).map(m=>[lbl(m),Math.round(ingMesMap[m])]);
  let acc=0; const acum=meses.map(m=>{acc+=ingMesMap[m];return[lbl(m),Math.round(acc)];}).slice(-12);
  const topCloser=Object.fromEntries(Object.entries(revCloser).sort((a,b)=>b[1]-a[1]).slice(0,6));
  const closers=[...new Set(gente.map(x=>(x.closer||'').trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
  BI={socios,totalVentas,ticket,porVencer,enRiesgo,telMal,revisar,closers,porTipo,revTipo,revCloser:topCloser,vencAnio,
    cartera:{'Vigentes':vig,'Vencidos':ven,'Sin fecha':sinf},ingMes,acum};
}

function abrirEdit(id){

  const set=(f,v)=>{$(f).value=v==null?"":v;};
  set('f_n',x.n==="(sin nombre)"?"":x.n);
  set('f_tel',telDig(x.tel)); set('f_dpi',dpiDig(x.dpi));
  $('f_tipo').value=TIPOS.includes(x.tipo)?x.tipo:'Sin dato';
  set('f_ing',x.ingreso); set('f_venc',x.venc);
  set('f_anios',x.anios); set('f_total',x.total||'');
  set('f_copro',x.copro); set('f_celcopro',telDig(x.cel_copro)); set('f_closer',x.closer);
  ['f_telerr','f_dpierr','f_ingerr','f_vencerr','f_anioserr','f_totalerr','f_celcoproerr'].forEach(e=>$(e).textContent="");
  const mot=motivoRevision(x), mb=$('f_motivo');
  if(mot.length){mb.style.display='block';mb.textContent='⚠️ Por revisar: '+mot.join(' · ');} else mb.style.display='none';

function cerrarModal(){ $('modal').style.display='none'; editId=null; }
async function guardarEdit(){
  const x=gente.find(g=>g.id===editId); if(!x)return;
  const tel=telDig($('f_tel').value), dpi=dpiDig($('f_dpi').value), celc=telDig($('f_celcopro').value);
  const tipo=$('f_tipo').value, ing=$('f_ing').value||null, venc=$('f_venc').value||null;
  const anios=$('f_anios').value.trim(), total=$('f_total').value.trim();
  const chk=[['f_telerr',VALIDA.tel(tel)],['f_dpierr',VALIDA.dpi(dpi)],['f_celcoproerr',VALIDA.tel(celc)],
    ['f_ingerr',VALIDA.fecha(ing)],['f_vencerr',VALIDA.fecha(venc)],['f_anioserr',VALIDA.num(anios)],['f_totalerr',VALIDA.num(total)]];
  let bad=false; chk.forEach(([e,msg])=>{$(e).textContent=msg; if(msg)bad=true;});
  if(bad) return;
  const nombre=$('f_n').value.trim(), copro=$('f_copro').value.trim()||null, closer=$('f_closer').value.trim()||null;
  const body={nombre:nombre||null,celular:tel||null,dpi:dpi||null,tipo:tipo,tipo_norm:tipo,
    fecha_ingreso:ing,vencimiento:venc,anios_servicio:anios===''?null:Number(anios),
    total_num:total===''?null:Number(total),copropietario:copro,cel_copro:celc||null,closer:closer,closer_norm:closer};
  const btn=$('msaveBtn'); btn.disabled=true; btn.textContent="Guardando…";
  try{
    await patchSocio(editId,body);
    const camb=[];
    if((nombre||"")!==(x.n==="(sin nombre)"?"":x.n)) camb.push('nombre');
    if(tel!==telDig(x.tel)) camb.push('teléfono');
    if(dpi!==dpiDig(x.dpi)) camb.push('DPI');
    if(tipo!==x.tipo) camb.push('tipo');
    if((ing||null)!==(x.ingreso||null)) camb.push('ingreso');
    if((venc||null)!==(x.venc||null)) camb.push('vencimiento');
    if(String(anios)!==String(x.anios??'')) camb.push('años');
    if(String(total)!==String(x.total||'')) camb.push('total');
    if((closer||null)!==(x.closer||null)) camb.push('closer');
    if((copro||null)!==(x.copro||null)) camb.push('copropietario');
    if(celc!==telDig(x.cel_copro)) camb.push('tel copro');
    if(camb.length) addInter(editId,'edicion','Editó: '+camb.join(', '));
    Object.assign(x,{n:nombre||"(sin nombre)",tel:tel,dpi:dpi,tipo:tipo,ingreso:ing,venc:venc,dv:calcDv(venc),
      anios:anios===''?null:Number(anios),total:total===''?0:Number(total),copro:copro,cel_copro:celc,closer:closer});
    calcularBI(); cerrarModal(); kpis(); render(); toast("✅ Guardado");
  }catch(e){ toast("⚠️ No se pudo guardar"); }
  finally{ btn.disabled=false; btn.textContent="Guardar"; }
}

async function cargarHist(id){
  const data=await traerInter(id), ul=$('ftl'); if(!ul)return;
  if(data===null){ ul.innerHTML='<li class="tt">El histórico se activa en breve (conectando la base).</li>'; return; }
  if(!data.length){ ul.innerHTML='<li class="tt">Sin interacciones aún. Registrá la primera arriba.</li>'; return; }
  const ico={nota:'📝',llamada:'☎',whatsapp:'💬',estado:'🔖',edicion:'✏️',reserva:'🧳'};
  ul.innerHTML=data.map(i=>`<li class="tli"><div class="tt">${ico[i.tipo]||'•'} ${new Date(i.creado_en).toLocaleString('es-GT',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})} · ${esc(i.usuario||'')}</div><div class="tc">${esc(i.nota||i.tipo)}</div></li>`).join('');
}
async function regInter(id,tipo){
  const ta=$('fnota'), nota=ta?ta.value.trim():'';
  if(tipo==='nota' && !nota){ toast('Escribí la nota primero'); return; }
  const texto=nota || {llamada:'Llamada registrada',whatsapp:'Contacto por WhatsApp'}[tipo] || tipo;
  if(await addInter(id,tipo,texto)){ if(ta)ta.value=''; toast('✅ Registrado'); cargarHist(id); }
  else toast('⚠️ Histórico aún no disponible');
}
// ── Kuxtal Club: tarjeta digital + beneficio + validación ──
let pendingValidar=null;
function cardHTML(x,usados){
  usados=usados||[];
  const anio=x.ingreso?x.ingreso.slice(0,4):'';
  const vencido=x.dv!=null&&x.dv<0;
  const misOf=vencido?[]:OFERTAS.filter(o=>o.tipo_objetivo==='todos'||o.tipo_objetivo===x.tipo);
  const top=`
    <div class="tcard${x.tipo==='VIP'?' vip':''}">
      <div class="tcard-top"><span class="tt">KUXTAL TRAVELS</span><span class="tplane">✈</span></div>
      <div class="tn">${esc(x.n)}</div>
      <div class="trow"><span class="tv">${esc(x.tipo)}</span><span class="tsince">MIEMBRO${anio?' DESDE '+anio:''}</span></div>
      <div class="tno">N° ${esc(x.no||'—')}</div>
    </div>`;
  let benef;
  if(vencido) benef=`<div class="ocard" style="border-color:#f3b0ab;background:#fdecea"><div class="oemoji">⏳</div><div class="obody"><div class="otit" style="color:#b3261e">Membresía vencida</div><div class="odescr">Venció el ${fechaTxt(x.venc)}. Renovala para volver a disfrutar tus beneficios.</div></div></div>`;
  else if(misOf.length) benef=`<h4 class="bh">Tus beneficios</h4>`+misOf.map(o=>ofertaBenef(o,usados.includes(o.id),x.id)).join('');
  else benef=`<p style="color:var(--gris);font-size:12.5px;text-align:center;margin:14px 2px">No hay promos para tu membresía ahora mismo.</p>`;
  return top+benef;
}
function ofertaBenef(o,usado,sid){
  const right = usado ? `<span class="obadge used">✅ Usado</span>` : `<span class="obadge use">Usar →</span>`;
  const attrs = usado ? '' : `onclick="usarPromo(${sid},${o.id})" style="cursor:pointer"`;
  return `<div class="ocard${usado?' isused':''}" ${attrs}><div class="oemoji">${esc(o.emoji||'✈️')}</div><div class="obody"><div class="otit">${esc(o.titulo)} ${o.descuento?`<span class="odesc">${esc(o.descuento)}</span>`:''}</div><div class="odescr">${esc(o.descripcion||'')}</div><div class="ometa">${o.vigencia_hasta?'Vigente hasta '+fechaTxt(o.vigencia_hasta):''}</div></div>${right}</div>`;
}
async function usosDeSocio(sid){ try{ const r=await fetch(SB_URL+"/rest/v1/usos?socio_id=eq."+sid+"&select=oferta_id",{headers:{apikey:SB_PUB,Authorization:"Bearer "+SES.access_token}}); if(!r.ok) return []; return (await r.json()).map(u=>u.oferta_id).filter(v=>v!=null); }catch(e){ return []; } }
async function renderCard(){ const x=gente.find(g=>g.id===cardCtx.sid); if(!x||!$(cardCtx.target)) return; const usados=await usosDeSocio(x.id); $(cardCtx.target).innerHTML=cardHTML(x,usados); }
async function abrirTarjeta(id){ cardCtx={sid:id,target:'tarjetaBody'}; $('tarjetaBody').innerHTML='<p style="text-align:center;color:var(--gris);padding:22px">Cargando…</p>'; $('tarjeta').style.display='flex'; await renderCard(); }
async function mostrarMiembro(){
  ['.stats','.tabs'].forEach(s=>{const e=document.querySelector(s);if(e)e.style.display='none';});
  ['search','cap','filtros'].forEach(id=>{const e=$(id);if(e)e.style.display='none';});
  $('tablero').innerHTML='';
  if(!gente[0]){ $('lista').innerHTML='<div class="vacio">No encontramos tu membresía.</div>'; return; }
  $('lista').innerHTML='<div id="miembroCard" style="max-width:460px;margin:14px auto 0"></div>';
  cardCtx={sid:gente[0].id,target:'miembroCard'}; await renderCard();
}
async function usarPromo(sid,ofId){
  const o=OFERTAS.find(x=>x.id===ofId); if(!o) return;
  if(!confirm(`¿Usar «${o.titulo}»? Se generará tu código para mostrar en el local.`)) return;
  const codigo=randCode(), expira=new Date(Date.now()+15*60000).toISOString();
  try{
    const r=await fetch(SB_URL+"/rest/v1/codigos",{method:"POST",headers:{apikey:SB_PUB,Authorization:"Bearer "+SES.access_token,"Content-Type":"application/json",Prefer:"return=minimal"},body:JSON.stringify({socio_id:sid,oferta_id:ofId,codigo:codigo,tipo:'descuento',expira_en:expira})});
    if(!r.ok) throw 0;
    addInter(sid,'beneficio','Generó código para '+o.titulo+' ('+codigo+')');
    mostrarQR(o,codigo);
  }catch(e){ toast('⚠️ No se pudo generar'); }
}
function mostrarQR(o,codigo){
  const url="https://jorgerramirezh-rocky.github.io/kuxtal-crm/validar.html?c="+codigo;
  $(cardCtx.target).innerHTML=`<div style="text-align:center">
    <div style="font-size:36px">${esc(o.emoji||'🎁')}</div>
    <h3 style="color:var(--kux);margin:6px 0">${esc(o.titulo)}</h3>
    ${o.descuento?`<div class="odesc" style="display:inline-block;margin-bottom:10px">${esc(o.descuento)}</div>`:''}
    <div class="qrbox"><div id="qrc"></div></div>
    <div class="codebig">${codigo}</div>
    <div style="color:var(--gris);font-size:12px;margin-top:4px">Mostralo en el local · vence en 15 min · un solo uso</div>
    <button class="btn-c edit" style="margin-top:14px" onclick="volverTarjeta()">← Volver a mi tarjeta</button>
  </div>`;
  if(window.QRCode) new QRCode(document.getElementById('qrc'),{text:url,width:210,height:210,correctLevel:QRCode.CorrectLevel.M});
}
function volverTarjeta(){ renderCard(); }
function cerrarTarjeta(){ $('tarjeta').style.display='none'; }
function randCode(){ const c='ABCDEFGHJKMNPQRSTUVWXYZ23456789'; let s=''; for(let i=0;i<8;i++) s+=c[Math.floor(Math.random()*c.length)]; return s; }
async function generarCodigo(id){
  const gx=gente.find(g=>g.id===id);
  if(gx&&gx.dv!=null&&gx.dv<0){ toast('Membresía vencida — no aplica'); return; }
  const codigo=randCode(), expira=new Date(Date.now()+15*60000).toISOString();
  try{
    const r=await fetch(SB_URL+"/rest/v1/codigos",{method:"POST",headers:{apikey:SB_PUB,Authorization:"Bearer "+SES.access_token,"Content-Type":"application/json",Prefer:"return=minimal"},body:JSON.stringify({socio_id:id,codigo:codigo,tipo:'descuento',expira_en:expira})});
    if(!r.ok) throw 0;
    const url=location.origin+location.pathname+"?validar="+codigo;
    $('codeArea').innerHTML=`<div class="qrbox"><div id="qrc"></div></div><div class="codebig">${codigo}</div><div style="color:var(--gris);font-size:12px;margin-top:4px">Vence en 15 min · un solo uso · el local lo escanea</div>`;
    if(window.QRCode) new QRCode(document.getElementById('qrc'),{text:url,width:190,height:190,correctLevel:QRCode.CorrectLevel.M});
    addInter(id,'beneficio','Generó código de descuento '+codigo);
  }catch(e){ toast('⚠️ No se pudo generar'); }
}
function showValida(cls,ico,t,s){ const v=$('valida'); v.className=cls; $('vico').textContent=ico; $('vt').textContent=t; $('vs').textContent=s||''; v.style.display='flex'; }
function cerrarValida(){ $('valida').style.display='none'; history.replaceState(null,'',location.pathname); if($('app').style.display!=='block') location.reload(); }
async function validarCodigo(codigo){
  showValida('','⏳','Validando…','');
  try{
    const r=await fetch(SB_URL+"/rest/v1/codigos?codigo=eq."+encodeURIComponent(codigo)+"&select=*,socios(nombre,tipo_norm,vencimiento)",{headers:{apikey:SB_PUB,Authorization:"Bearer "+SES.access_token}});
    const d=await r.json(), c=d&&d[0];
    if(!c) return showValida('bad','❌','Código inválido','');
    if(c.usado) return showValida('bad','⛔','Código ya usado',new Date(c.usado_en).toLocaleString('es-GT'));
    if(new Date(c.expira_en)<new Date()) return showValida('bad','⌛','Código vencido','Pedile al socio uno nuevo');
    if(c.socios&&c.socios.vencimiento&&new Date(c.socios.vencimiento)<new Date()) return showValida('bad','⏳','Membresía vencida','Renová para usar beneficios');
    await fetch(SB_URL+"/rest/v1/codigos?id=eq."+c.id,{method:"PATCH",headers:{apikey:SB_PUB,Authorization:"Bearer "+SES.access_token,"Content-Type":"application/json",Prefer:"return=minimal"},body:JSON.stringify({usado:true,usado_en:new Date().toISOString(),usado_por:USER})});
    await fetch(SB_URL+"/rest/v1/usos",{method:"POST",headers:{apikey:SB_PUB,Authorization:"Bearer "+SES.access_token,"Content-Type":"application/json",Prefer:"return=minimal"},body:JSON.stringify({socio_id:c.socio_id,tipo:'descuento',codigo:codigo,usuario:USER})});
    addInter(c.socio_id,'uso','Usó beneficio (descuento) '+codigo);
    const so=c.socios||{};
    showValida('ok','✅',(so.tipo_norm||'Socio')+' · '+(so.nombre||''),'Disfrutá tu beneficio 🎉');
  }catch(e){ showValida('bad','⚠️','No se pudo validar','Reintentá'); }
}
async function arrancar(){
  $('gate').style.display='none'; $('app').style.display='none'; $('load').style.display='flex';
  try{
    decodeUser();
    gente=await traerSocios(); OFERTAS=await traerOfertas(); calcularBI();
    $('load').style.display='none'; $('app').style.display='block';
    document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>ir(t.dataset.t));
    $('buscar').oninput=()=>{verLim=60;render()};
    if(ROLE==='cliente'){ mostrarMiembro(); $('rolLabel').textContent=USER; return true; }
    kpis(); render(); $('rolLabel').textContent=USER+' · '+rolBonito(ROLE); return true;
  }catch(e){ $('load').style.display='none'; return false; }
}
function mostrarLogin(){ $('load').style.display='none'; $('app').style.display='none'; $('gate').style.display='flex'; setTimeout(()=>$('p').focus(),100); }
$('p').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
$('modal').addEventListener('click',e=>{if(e.target.id==='modal')cerrarModal();});
$('ficha').addEventListener('click',e=>{if(e.target.id==='ficha')cerrarFicha();});
$('tarjeta').addEventListener('click',e=>{if(e.target.id==='tarjeta')cerrarTarjeta();});
$('promoModal').addEventListener('click',e=>{if(e.target.id==='promoModal')cerrarPromo();});
$('modal').addEventListener('keydown',e=>{if(e.key==='Enter'&&e.target.tagName==='INPUT'){e.preventDefault();guardarEdit();}});

(async function init(){
  pendingValidar=new URLSearchParams(location.search).get('validar');
  if(await refrescar()){ if(await arrancar()){ if(pendingValidar) validarCodigo(pendingValidar); } else mostrarLogin(); }
  else mostrarLogin();
})();
</script>
